<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salon Reservation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Outfit:wght@300;400;600&display=swap');

        body {
            font-family: 'Outfit', 'Noto Serif JP', sans-serif;
            background-color: #fcfbf7;
            color: #1a1a1a;
        }

        .luxury-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.1);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.05);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .luxury-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px -15px rgba(212, 175, 55, 0.15);
            border-color: rgba(212, 175, 55, 0.3);
        }

        .btn-primary {
            background: linear-gradient(135deg, #2c2c2c 0%, #000000 100%);
            color: white;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        .fade-enter {
            opacity: 0;
            transform: translateY(20px);
        }

        .step-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #e5e5e5;
            transition: all 0.3s ease;
        }

        .step-indicator.active {
            background: #d4af37;
            width: 24px;
            border-radius: 4px;
        }

        /* Loading Spinner */
        .spinner {
            border: 3px solid rgba(212, 175, 55, 0.1);
            border-left-color: #d4af37;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="min-h-screen flex flex-col">

    <!-- Navigation -->
    <nav class="p-6 flex justify-between items-center bg-white/50 sticky top-0 z-50">
        <h1 class="text-2xl font-bold tracking-widest text-[#2c2c2c]">AKASAKA <span class="text-[#d4af37]">SALON</span>
        </h1>
        <button id="adminBtn" class="text-gray-400 hover:text-gray-600">
            <i data-lucide="settings"></i>
        </button>
    </nav>

    <!-- Main Container -->
    <main id="app" class="flex-grow max-w-4xl mx-auto w-full p-4 md:p-8">

        <!-- Step Indicators -->
        <div class="flex justify-center space-x-2 mb-12">
            <div id="dot1" class="step-indicator active"></div>
            <div id="dot2" class="step-indicator"></div>
            <div id="dot3" class="step-indicator"></div>
        </div>

        <!-- content injected here -->
        <div id="content" class="fade-enter"></div>

    </main>

    <!-- Modal for Loading -->
    <div id="loader" class="fixed inset-0 bg-white/80 hidden z-[100] flex flex-col items-center justify-center">
        <div class="spinner"></div>
        <p class="mt-4 text-sm font-medium text-gray-500">Loading...</p>
    </div>

    <!-- Modal for Admin -->
    <div id="adminModal" class="fixed inset-0 bg-black/50 hidden z-[200] items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto p-6 luxury-card">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">Menu Dashboard</h2>
                <button onclick="toggleAdmin(false)" class="p-2 hover:bg-gray-100 rounded-full">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <div id="adminList" class="space-y-4"></div>
        </div>
    </div>

    <script>
        // === GAS Web App URL ===
        // TODO: ここにデプロイしたGASのWebアプリURLを設定してください
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbwxMWeYtRSl2d4RfP9eNLnop2xmKJ1uri9MWsJ_ZGx1C5ig8A8NU0w904VLcbhD-LgB/exec';

        // State Management
        let state = {
            step: 1,
            gender: null,
            menu: null,
            date: null,
            time: null,
            menus: []
        };

        // GAS JSONP Caller (CORS回避用)
        async function fetchGAS(action, payload = {}) {
            if (GAS_URL === 'YOUR_GAS_WEB_APP_URL') {
                throw new Error("GASのURLが設定されていません。コード内の GAS_URL を更新してください。");
            }

            return new Promise((resolve, reject) => {
                // 一意のコールバック関数名を生成
                const callbackName = 'gasCallback_' + Math.round(100000 * Math.random());

                // コールバック関数をグローバルに定義
                window[callbackName] = function (data) {
                    // スクリプトタグをクリーンアップ
                    const script = document.getElementById(callbackName);
                    if (script) document.head.removeChild(script);
                    delete window[callbackName];
                    clearTimeout(timeoutId);

                    if (data.status === 'success') {
                        resolve(data.data);
                    } else {
                        reject(new Error(data.message));
                    }
                };

                // タイムアウト設定 (15秒)
                const timeoutId = setTimeout(() => {
                    const script = document.getElementById(callbackName);
                    if (script) document.head.removeChild(script);
                    delete window[callbackName];
                    reject(new Error("Request timeout. GASの応答がありません。"));
                }, 15000);

                // URLパラメータの構築
                const url = new URL(GAS_URL);
                url.searchParams.append('action', action);
                url.searchParams.append('callback', callbackName);

                // ペイロードをフラットにパラメータ化
                for (let key in payload) {
                    if (typeof payload[key] === 'object') {
                        url.searchParams.append('details', JSON.stringify(payload[key]));
                        // DetailsやupdateObjのようなネストオブジェクト用
                        if (key === 'updateObj') url.searchParams.append('updateObj', JSON.stringify(payload[key]));
                    } else {
                        url.searchParams.append(key, payload[key]);
                    }
                }

                // スクリプトタグの追加によるGETリクエスト (CORS制約なし)
                const script = document.createElement('script');
                script.id = callbackName;
                script.src = url.toString();
                script.onerror = () => {
                    document.head.removeChild(script);
                    delete window[callbackName];
                    clearTimeout(timeoutId);
                    reject(new Error("Network Error: Could not connect to GAS"));
                };
                document.head.appendChild(script);
            });
        }

        // Initialize Lucide Icons
        lucide.createIcons();

        // Navigation Controllers
        const content = document.getElementById('content');
        const loader = document.getElementById('loader');

        async function goToStep(step) {
            state.step = step;
            updateDots();

            // Animation out
            await gsap.to(content, { opacity: 0, y: -20, duration: 0.3 });

            renderStep();

            // Animation in
            gsap.fromTo(content, { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.5 });
        }

        function updateDots() {
            [1, 2, 3].forEach(i => {
                document.getElementById(`dot${i}`).className = `step-indicator ${state.step >= i ? 'active' : ''}`;
            });
        }

        function showLoader(show) {
            loader.classList.toggle('hidden', !show);
        }

        // --- View Renders ---

        function renderStep() {
            content.innerHTML = '';
            if (state.step === 1) renderGenderSelection();
            else if (state.step === 2) renderMenuSelection();
            else if (state.step === 3) renderDateTimeSelection();
            lucide.createIcons();
        }

        function renderGenderSelection() {
            content.innerHTML = `
                <div class="text-center mb-12">
                    <h2 class="text-3xl font-bold mb-2">Welcome</h2>
                    <p class="text-gray-500">性別を選択してください</p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <button onclick="selectGender('Lady\'s')" class="luxury-card p-12 rounded-2xl flex flex-col items-center group">
                        <div class="p-6 bg-[#fdf2f2] rounded-full mb-6 group-hover:bg-[#fbdada] transition-colors">
                            <i data-lucide="venus" class="w-12 h-12 text-[#e28a8a]"></i>
                        </div>
                        <span class="text-2xl font-bold">Lady's</span>
                        <span class="text-sm text-gray-400 mt-2">Women</span>
                    </button>
                    <button onclick="selectGender('Men\'s')" class="luxury-card p-12 rounded-2xl flex flex-col items-center group">
                        <div class="p-6 bg-[#f2f6fd] rounded-full mb-6 group-hover:bg-[#dae4fb] transition-colors">
                            <i data-lucide="mars" class="w-12 h-12 text-[#8aade2]"></i>
                        </div>
                        <span class="text-2xl font-bold">Men's</span>
                        <span class="text-sm text-gray-400 mt-2">Men</span>
                    </button>
                </div>
            `;
        }

        async function selectGender(gender) {
            state.gender = gender;
            showLoader(true);
            try {
                // Call GAS function via fetch
                state.menus = await fetchGAS('getMenuData', { gender });
                goToStep(2);
            } catch (e) {
                alert('データ取得に失敗しました');
            } finally {
                showLoader(false);
            }
        }

        function renderMenuSelection() {
            content.innerHTML = `
                <div class="mb-8">
                    <button onclick="goToStep(1)" class="text-sm text-gray-400 flex items-center hover:text-gray-600 mb-4">
                        <i data-lucide="chevron-left" class="w-4 h-4 mr-1"></i> 性別選択へ戻る
                    </button>
                    <h2 class="text-2xl font-bold">${state.gender} メニュー一覧</h2>
                </div>
                <div class="grid gap-6">
                    ${state.menus.map((menu, index) => `
                        <div onclick="handleMenuClick(${index})" class="luxury-card p-6 rounded-2xl flex flex-col md:flex-row justify-between items-start md:items-center cursor-pointer">
                            <div class="flex-grow">
                                <div class="flex items-center gap-3 mb-2">
                                    <h3 class="text-lg font-bold">${menu.Name}</h3>
                                    ${menu.Coupon ? `<span class="bg-[#fdf2f2] text-[#e28a8a] text-[10px] px-2 py-0.5 rounded-full font-bold">COUPON</span>` : ''}
                                </div>
                                <p class="text-sm text-gray-500 mb-4 leading-relaxed">${menu.Description}</p>
                                <div class="flex items-center text-xs text-gray-400 space-x-4">
                                    <span class="flex items-center"><i data-lucide="clock" class="w-3 h-3 mr-1"></i> ${menu.Duration}分</span>
                                    <span class="font-bold text-gray-800">¥${Number(menu.Price).toLocaleString()}</span>
                                </div>
                            </div>
                            <div class="mt-4 md:mt-0 md:ml-6 flex items-center text-[#d4af37] font-bold text-sm">
                                選択する <i data-lucide="chevron-right" class="w-4 h-4 ml-1"></i>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // データを安全に渡すための新しい関数
        function handleMenuClick(index) {
            const selectedMenu = state.menus[index];
            selectMenu(selectedMenu);
        }

        function selectMenu(menu) {
            state.menu = menu;
            goToStep(3);
        }

        function renderDateTimeSelection() {
            // Generate next 7 days
            const dates = [];
            for (let i = 0; i < 7; i++) {
                const d = new Date();
                d.setDate(d.getDate() + i);
                dates.push(d);
            }

            content.innerHTML = `
                <div class="mb-8">
                    <button onclick="goToStep(2)" class="text-sm text-gray-400 flex items-center hover:text-gray-600 mb-4">
                        <i data-lucide="chevron-left" class="w-4 h-4 mr-1"></i> メニュー選択へ戻る
                    </button>
                    <h2 class="text-2xl font-bold">日時を選択</h2>
                    <p class="text-xs text-gray-400 mt-1">${state.menu.Name} (${state.menu.Duration}分)</p>
                </div>
                
                <div class="flex space-x-2 overflow-x-auto pb-4 mb-8 -mx-4 px-4 scrollbar-hide">
                    ${dates.map((d, i) => {
                const dateStr = d.toISOString().split('T')[0];
                const isSelected = state.date === dateStr;
                return `
                            <button onclick="selectDate('${dateStr}')" class="flex-shrink-0 w-16 h-20 rounded-xl flex flex-col items-center justify-center transition-all ${isSelected ? 'bg-black text-white' : 'bg-white text-gray-500 luxury-card'}">
                                <span class="text-[10px] uppercase">${['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'][d.getDay()]}</span>
                                <span class="text-xl font-bold">${d.getDate()}</span>
                            </button>
                        `;
            }).join('')}
                </div>

                <div id="timeSlots" class="grid grid-cols-3 md:grid-cols-4 gap-3">
                    ${state.date ? '<div class="col-span-full py-12 text-center text-gray-400">Loading availability...</div>' : '<div class="col-span-full py-12 text-center text-gray-400">日付を選択してください</div>'}
                </div>
            `;

            if (state.date) fetchSlots();
        }

        async function selectDate(date) {
            state.date = date;
            renderStep();
        }

        async function fetchSlots() {
            const slotContainer = document.getElementById('timeSlots');
            try {
                const slots = await fetchGAS('getAvailableSlots', {
                    dateStr: state.date,
                    durationMin: state.menu.Duration
                });

                slotContainer.innerHTML = slots.length > 0
                    ? slots.map(time => `<button onclick="confirmBooking('${time}')" class="p-4 rounded-xl text-center text-sm font-bold bg-white luxury-card hover:bg-black hover:text-white transition-colors">${time}</button>`).join('')
                    : '<p class="col-span-full text-center py-12 text-gray-400">申し訳ありません。空きがありません。</p>';
            } catch (e) {
                slotContainer.innerHTML = '<p class="col-span-full text-center py-12 text-red-400 font-bold">エラーが発生しました</p>';
            }
        }

        async function confirmBooking(time) {
            const name = prompt('お名前を入力してください');
            if (!name) return;

            showLoader(true);
            try {
                await fetchGAS('createBooking', {
                    details: {
                        gender: state.gender,
                        menuName: state.menu.Name,
                        dateStr: state.date,
                        timeStr: time,
                        durationMin: state.menu.Duration,
                        customerName: name
                    }
                });
                alert('予約が完了しました！');
                location.reload();
            } catch (e) {
                alert('予約に失敗しました');
            } finally {
                showLoader(false);
            }
        }

        // --- Admin Dashbord Logic ---
        document.getElementById('adminBtn').onclick = () => toggleAdmin(true);

        async function toggleAdmin(show) {
            const modal = document.getElementById('adminModal');
            if (show) {
                modal.style.display = 'flex';
                renderAdminList();
            } else {
                modal.style.display = 'none';
            }
        }

        function renderAdminList() {
            const list = document.getElementById('adminList');
            // Show all menus (need to fetch if not cached)
            list.innerHTML = state.menus.map(menu => `
                <div class="p-4 border border-gray-100 rounded-xl space-y-3">
                    <div class="flex justify-between">
                        <span class="text-xs font-bold text-[#d4af37]">${menu.Gender}</span>
                        <span class="text-xs text-gray-400">Row ID: ${menu.rowId}</span>
                    </div>
                    <div>
                        <label class="text-[10px] text-gray-400 uppercase">Menu Name</label>
                        <input type="text" value="${menu.Name}" onblur="updateField(${menu.rowId}, 'Name', this.value)" class="w-full text-sm font-bold border-b border-transparent focus:border-[#d4af37] outline-none">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] text-gray-400 uppercase">Duration (min)</label>
                            <input type="number" value="${menu.Duration}" onblur="updateField(${menu.rowId}, 'Duration', this.value)" class="w-full text-sm border-b border-transparent focus:border-[#d4af37] outline-none">
                        </div>
                        <div>
                            <label class="text-[10px] text-gray-400 uppercase">Price (JPY)</label>
                            <input type="number" value="${menu.Price}" onblur="updateField(${menu.rowId}, 'Price', this.value)" class="w-full text-sm border-b border-transparent focus:border-[#d4af37] outline-none">
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function updateField(rowId, field, value) {
            try {
                await fetchGAS('updateMenuData', { rowId, updateObj: { [field]: value } });
            } catch (e) {
                console.error(e);
                alert('更新に失敗しました');
            }
        }

        // Initial Start
        goToStep(1);
    </script>
</body>

</html>
