<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salon Reservation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Outfit:wght@300;400;600&display=swap');

        body {
            font-family: 'Outfit', 'Noto Serif JP', sans-serif;
            background-color: #fcfbf7;
            color: #1a1a1a;
        }

        .luxury-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.1);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.05);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .luxury-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px -15px rgba(212, 175, 55, 0.15);
            border-color: rgba(212, 175, 55, 0.3);
        }

        .btn-primary {
            background: linear-gradient(135deg, #2c2c2c 0%, #000000 100%);
            color: white;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        .fade-enter {
            opacity: 0;
            transform: translateY(20px);
        }

        .step-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #e5e5e5;
            transition: all 0.3s ease;
        }

        .step-indicator.active {
            background: #d4af37;
            width: 24px;
            border-radius: 4px;
        }

        /* Loading Spinner */
        .spinner {
            border: 3px solid rgba(212, 175, 55, 0.1);
            border-left-color: #d4af37;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="min-h-screen flex flex-col">

    <!-- Navigation -->
    <nav class="p-6 flex justify-between items-center bg-white/50 sticky top-0 z-50">
        <h1 class="text-2xl font-bold tracking-widest text-[#2c2c2c]">AKASAKA <span class="text-[#d4af37]">SALON</span>
        </h1>
        <button id="adminBtn" class="text-gray-400 hover:text-gray-600">
            <i data-lucide="settings"></i>
        </button>
    </nav>

    <!-- Main Container -->
    <main id="app" class="flex-grow max-w-4xl mx-auto w-full p-4 md:p-8">

        <!-- Step Indicators -->
        <div class="flex justify-center space-x-2 mb-12">
            <div id="dot1" class="step-indicator active"></div>
            <div id="dot2" class="step-indicator"></div>
            <div id="dot3" class="step-indicator"></div>
        </div>

        <!-- content injected here -->
        <div id="content" class="fade-enter"></div>

    </main>

    <!-- Modal for Loading -->
    <div id="loader" class="fixed inset-0 bg-white/80 hidden z-[100] flex flex-col items-center justify-center">
        <div class="spinner"></div>
        <p class="mt-4 text-sm font-medium text-gray-500">Loading...</p>
    </div>

    <!-- Modal for Admin -->
    <div id="adminModal" class="fixed inset-0 bg-black/50 hidden z-[200] items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto p-6 luxury-card">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">Menu Dashboard</h2>
                <button id="closeAdminBtn" class="p-2 hover:bg-gray-100 rounded-full">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <div id="adminList" class="space-y-4"></div>
        </div>
    </div>

    <script>
        // TODO: デプロイ後のGASウェブアプリのURLを設定してください
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbxqeR5Nr3tbOM5LK183K359k4DKKaKC74uu-GVvZgvrt9fi7xl5OXJB0aaUwvJDGxtV/exec';

        // State Management
        let state = {
            step: 1,
            gender: null,
            menu: null,
            date: null,
            time: null,
            menus: []
        };

        // GAS API Caller
        async function fetchGAS(action, payload = {}) {
            if (!GAS_URL || GAS_URL === 'YOUR_WEB_APP_URL') {
                throw new Error("GAS_URL が設定されていません。コード上の URL を確認してください。");
            }

            try {
                const formParams = new URLSearchParams();
                formParams.append('payload', JSON.stringify({ action, ...payload }));

                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'cors',
                    redirect: 'follow',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: formParams.toString()
                });

                // 一旦テキストとして受信する
                const text = await res.text();

                // ■修正点：受信した生データをコンソールへ強力にロギング（デバッグ用）
                console.log(`[fetchGAS] Action: '${action}' -----------------`);
                console.log(`[fetchGAS] HTTP Status: ${res.status}`);
                console.log(`[fetchGAS] Raw Data: \n`, text);

                if (!res.ok) {
                    throw new Error(`HTTP Error: ${res.status} ${res.statusText}`);
                }

                let json;
                try {
                    json = JSON.parse(text);
                } catch (e) {
                    console.error("[fetchGAS] JSON Parse Error!");
                    throw new Error("GASから不正な形式のデータが返されました。Raw Dataを確認してください。");
                }

                if (json.status === 'success') {
                    // getMenuData の時だけ、スプレッドシートの日本語ヘッダーを英語キーに変換する
                    if (action === 'getMenuData') {
                        return json.data.map(item => {
                            return {
                                rowId: item.rowId,
                                Gender: item.Gender || item["B列 (Gender)"] || '',
                                Name: item.Name || item["C列 (Name)"] || '',
                                Duration: item.Duration || item["D列 (Duration)"] || 0,
                                Price: item.Price || item["E列 (Price)"] || 0,
                                Description: item.Description || item["F列 (Description)"] || '',
                                Coupon: item.Coupon !== undefined ? item.Coupon : (item["G列 (Coupon)"] === "有" || item["G列 (Coupon)"] === true)
                            };
                        });
                    }
                    // その他のアクション（空き時間取得など）はそのまま返す
                    return json.data;
                } else {
                    throw new Error(json.message || "Unknown GAS error occurred");
                }
            } catch (error) {
                console.error(`[fetchGAS] Exception:`, error);
                throw error;
            }
        }

        // Initialize Lucide Icons
        lucide.createIcons();

        // Navigation Controllers
        const content = document.getElementById('content');
        const loader = document.getElementById('loader');

        async function goToStep(step) {
            state.step = step;
            updateDots();

            await gsap.to(content, { opacity: 0, y: -20, duration: 0.3 });

            renderStep();

            gsap.fromTo(content, { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.5 });
        }

        function updateDots() {
            [1, 2, 3].forEach(i => {
                document.getElementById(`dot${i}`).className = `step-indicator ${state.step >= i ? 'active' : ''}`;
            });
        }

        function showLoader(show) {
            loader.classList.toggle('hidden', !show);
        }

        // --- View Renders ---

        function renderStep() {
            content.innerHTML = '';
            if (state.step === 1) renderGenderSelection();
            else if (state.step === 2) renderMenuSelection();
            else if (state.step === 3) renderDateTimeSelection();
            lucide.createIcons();
        }

        function renderGenderSelection() {
            content.innerHTML = `
                <div class="text-center mb-12">
                    <h2 class="text-3xl font-bold mb-2">Welcome</h2>
                    <p class="text-gray-500">性別を選択してください</p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <button data-gender="Lady's" class="gender-btn luxury-card p-12 rounded-2xl flex flex-col items-center group">
                        <div class="p-6 bg-[#fdf2f2] rounded-full mb-6 group-hover:bg-[#fbdada] transition-colors">
                            <i data-lucide="venus" class="w-12 h-12 text-[#e28a8a]"></i>
                        </div>
                        <span class="text-2xl font-bold">Lady's</span>
                        <span class="text-sm text-gray-400 mt-2">Women</span>
                    </button>
                    <button data-gender="Men's" class="gender-btn luxury-card p-12 rounded-2xl flex flex-col items-center group">
                        <div class="p-6 bg-[#f2f6fd] rounded-full mb-6 group-hover:bg-[#dae4fb] transition-colors">
                            <i data-lucide="mars" class="w-12 h-12 text-[#8aade2]"></i>
                        </div>
                        <span class="text-2xl font-bold">Men's</span>
                        <span class="text-sm text-gray-400 mt-2">Men</span>
                    </button>
                </div>
            `;

            document.querySelectorAll('.gender-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const gender = btn.getAttribute('data-gender');
                    selectGender(gender);
                });
            });
        }

        async function selectGender(gender) {
            state.gender = gender;
            showLoader(true);
            try {
                state.menus = await fetchGAS('getMenuData', { gender });
                goToStep(2);
            } catch (e) {
                alert('データ取得エラー：詳細はF12の開発者コンソールを確認してください。');
            } finally {
                showLoader(false);
            }
        }

        function renderMenuSelection() {
            let menuContent = '';

            // ■修正点：配列が空、またはデータがない場合の分かりやすいエラー表示
            if (!state.menus || state.menus.length === 0) {
                menuContent = `
                    <div class="col-span-full py-12 px-6 text-center luxury-card rounded-xl">
                        <i data-lucide="alert-circle" class="w-12 h-12 text-red-400 mx-auto mb-4"></i>
                        <p class="text-red-500 font-bold mb-2">メニューが見つかりませんでした。</p>
                        <p class="text-gray-500 text-sm">スプレッドシートとの接続、または「Menus」シートのデータ（性別など）が正しく入力されているか確認してください。</p>
                    </div>
                `;
            } else {
                menuContent = state.menus.map((menu, index) => `
                    <div data-index="${index}" class="menu-card luxury-card p-6 rounded-2xl flex flex-col md:flex-row justify-between items-start md:items-center cursor-pointer hover:border-[#d4af37]">
                        <div class="flex-grow">
                            <div class="flex items-center gap-3 mb-2">
                                <!-- ■修正点：プロパティ表示の堅牢化 -->
                                <h3 class="text-lg font-bold">${menu.Name || '名称未設定'}</h3>
                                ${menu.Coupon ? `<span class="bg-[#fdf2f2] text-[#e28a8a] text-[10px] px-2 py-0.5 rounded-full font-bold">COUPON</span>` : ''}
                            </div>
                            <p class="text-sm text-gray-500 mb-4 leading-relaxed">${menu.Description || ''}</p>
                            <div class="flex items-center text-xs text-gray-400 space-x-4">
                                <span class="flex items-center"><i data-lucide="clock" class="w-3 h-3 mr-1"></i> ${menu.Duration || 0}分</span>
                                <span class="font-bold text-gray-800">¥${Number(menu.Price || 0).toLocaleString()}</span>
                            </div>
                        </div>
                        <div class="mt-4 md:mt-0 md:ml-6 flex items-center text-[#d4af37] font-bold text-sm">
                            選択する <i data-lucide="chevron-right" class="w-4 h-4 ml-1"></i>
                        </div>
                    </div>
                `).join('');
            }

            content.innerHTML = `
                <div class="mb-8">
                    <button id="backToGenderBtn" class="text-sm text-gray-400 flex items-center hover:text-gray-600 mb-4">
                        <i data-lucide="chevron-left" class="w-4 h-4 mr-1"></i> 性別選択へ戻る
                    </button>
                    <h2 class="text-2xl font-bold">${state.gender} メニュー一覧</h2>
                </div>
                <div class="grid gap-6">
                    ${menuContent}
                </div>
            `;

            document.getElementById('backToGenderBtn').addEventListener('click', () => goToStep(1));

            document.querySelectorAll('.menu-card').forEach(card => {
                card.addEventListener('click', () => {
                    const index = card.getAttribute('data-index');
                    handleMenuClick(parseInt(index, 10));
                });
            });
        }

        function handleMenuClick(index) {
            const selectedMenu = state.menus[index];
            selectMenu(selectedMenu);
        }

        function selectMenu(menu) {
            state.menu = menu;
            goToStep(3);
        }

        function renderDateTimeSelection() {
            const dates = [];
            for (let i = 0; i < 7; i++) {
                const d = new Date();
                d.setDate(d.getDate() + i);
                dates.push(d);
            }

            content.innerHTML = `
                <div class="mb-8">
                    <button id="backToMenuBtn" class="text-sm text-gray-400 flex items-center hover:text-gray-600 mb-4">
                        <i data-lucide="chevron-left" class="w-4 h-4 mr-1"></i> メニュー選択へ戻る
                    </button>
                    <h2 class="text-2xl font-bold">日時を選択</h2>
                    <p class="text-xs text-gray-400 mt-1">${state.menu.Name || '選択中メニュー'} (${state.menu.Duration || 0}分)</p>
                </div>
                
                <div class="flex space-x-2 overflow-x-auto pb-4 mb-8 -mx-4 px-4 scrollbar-hide">
                    ${dates.map((d, i) => {
                const dateStr = d.toISOString().split('T')[0];
                const isSelected = state.date === dateStr;
                return `
                            <button data-date="${dateStr}" class="date-btn flex-shrink-0 w-16 h-20 rounded-xl flex flex-col items-center justify-center transition-all ${isSelected ? 'bg-black text-white shadow-lg' : 'bg-white text-gray-500 luxury-card'}">
                                <span class="text-[10px] uppercase">${['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'][d.getDay()]}</span>
                                <span class="text-xl font-bold">${d.getDate()}</span>
                            </button>
                        `;
            }).join('')}
                </div>

                <div id="timeSlots" class="grid grid-cols-3 md:grid-cols-4 gap-3">
                    ${state.date ? '<div class="col-span-full py-12 text-center text-gray-400"><div class="spinner mx-auto mb-4"></div>読み込み中...</div>' : '<div class="col-span-full py-12 text-center text-gray-400">日付を選択してください</div>'}
                </div>
            `;

            document.getElementById('backToMenuBtn').addEventListener('click', () => goToStep(2));

            document.querySelectorAll('.date-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const dateStr = btn.getAttribute('data-date');
                    selectDate(dateStr);
                });
            });

            if (state.date) fetchSlots();
        }

        async function selectDate(date) {
            state.date = date;
            renderStep();
        }

        async function fetchSlots() {
            const slotContainer = document.getElementById('timeSlots');
            try {
                // ■修正点：durationの未定義対策
                const duration = state.menu.Duration ? state.menu.Duration : 60;

                const slots = await fetchGAS('getAvailableSlots', {
                    dateStr: state.date,
                    durationMin: duration
                });

                slotContainer.innerHTML = slots.length > 0
                    ? slots.map(time => `<button data-time="${time}" class="time-btn p-4 rounded-xl text-center text-sm font-bold bg-white luxury-card hover:bg-[#d4af37] hover:text-white transition-colors hover:border-transparent">${time}</button>`).join('')
                    : `
                    <div class="col-span-full py-12 px-4 luxury-card rounded-xl text-center">
                        <i data-lucide="calendar-x" class="w-10 h-10 text-gray-300 mx-auto mb-3"></i>
                        <p class="text-gray-500 font-bold mb-1">申し訳ありません。<br>空きがありません。</p>
                        <p class="text-xs text-gray-400">別の日付を選択してください</p>
                    </div>`;

                lucide.createIcons();

                document.querySelectorAll('.time-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const timeStr = btn.getAttribute('data-time');
                        confirmBooking(timeStr);
                    });
                });
            } catch (e) {
                slotContainer.innerHTML = '<p class="col-span-full text-center py-12 text-red-500 font-bold">通信エラーが発生しました。F12コンソールを確認してください。</p>';
            }
        }

        async function confirmBooking(time) {
            const name = prompt('お名前を入力してください');
            if (!name) return;

            showLoader(true);
            try {
                await fetchGAS('createBooking', {
                    details: {
                        gender: state.gender,
                        menuName: state.menu.Name,
                        dateStr: state.date,
                        timeStr: time,
                        durationMin: state.menu.Duration,
                        customerName: name
                    }
                });
                alert('予約が完了しました！');
                location.reload();
            } catch (e) {
                alert('予約に失敗しました。詳細は開発者コンソールを確認してください。');
            } finally {
                showLoader(false);
            }
        }

        // --- Admin Dashbord Logic ---
        document.getElementById('adminBtn').addEventListener('click', () => toggleAdmin(true));
        document.getElementById('closeAdminBtn').addEventListener('click', () => toggleAdmin(false));

        async function toggleAdmin(show) {
            const modal = document.getElementById('adminModal');
            if (show) {
                modal.style.display = 'flex';
                renderAdminList();
            } else {
                modal.style.display = 'none';
            }
        }

        function renderAdminList() {
            const list = document.getElementById('adminList');
            const defaultDate = new Date().toISOString().split('T')[0];

            list.innerHTML = state.menus.map(menu => `
                <div class="p-4 border border-gray-100 rounded-xl space-y-3">
                    <div class="flex justify-between">
                        <span class="text-xs font-bold text-[#d4af37]">${menu.Gender || ''}</span>
                        <span class="text-xs text-gray-400">Row ID: ${menu.rowId || ''}</span>
                    </div>
                    <div>
                        <label class="text-[10px] text-gray-400 uppercase">Menu Name</label>
                        <input type="text" value="${menu.Name || ''}" data-rowid="${menu.rowId}" data-field="Name" class="admin-input w-full text-sm font-bold border-b border-transparent focus:border-[#d4af37] outline-none">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] text-gray-400 uppercase">Duration (min)</label>
                            <input type="number" value="${menu.Duration || 0}" data-rowid="${menu.rowId}" data-field="Duration" class="admin-input w-full text-sm border-b border-transparent focus:border-[#d4af37] outline-none">
                        </div>
                        <div>
                            <label class="text-[10px] text-gray-400 uppercase">Price (JPY)</label>
                            <input type="number" value="${menu.Price || 0}" data-rowid="${menu.rowId}" data-field="Price" class="admin-input w-full text-sm border-b border-transparent focus:border-[#d4af37] outline-none">
                        </div>
                    </div>
                </div>
            `).join('');

            document.querySelectorAll('.admin-input').forEach(input => {
                input.addEventListener('blur', (e) => {
                    const rowId = parseInt(e.target.getAttribute('data-rowid'), 10);
                    const field = e.target.getAttribute('data-field');
                    const value = e.target.value;
                    updateField(rowId, field, value);
                });
            });
        }

        async function updateField(rowId, field, value) {
            try {
                await fetchGAS('updateMenuData', { rowId, updateObj: { [field]: value } });
            } catch (e) {
                alert('更新に失敗しました。詳細はF12コンソールをご確認ください。');
            }
        }

        // Initial Start
        goToStep(1);
    </script>
</body>

</html>
