<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salon Reservation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Outfit:wght@300;400;600&display=swap');

        body {
            font-family: 'Outfit', 'Noto Serif JP', sans-serif;
            background-color: #fcfbf7;
            color: #1a1a1a;
        }

        .luxury-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.1);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.05);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .luxury-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px -15px rgba(212, 175, 55, 0.15);
            border-color: rgba(212, 175, 55, 0.3);
        }

        .btn-primary {
            background: linear-gradient(135deg, #2c2c2c 0%, #000000 100%);
            color: white;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        .fade-enter {
            opacity: 0;
            transform: translateY(20px);
        }

        .step-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #e5e5e5;
            transition: all 0.3s ease;
        }

        .step-indicator.active {
            background: #d4af37;
            width: 24px;
            border-radius: 4px;
        }

        /* Loading Spinner */
        .spinner {
            border: 3px solid rgba(212, 175, 55, 0.1);
            border-left-color: #d4af37;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Calendar UI */
        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .cal-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .cal-day:hover:not(:disabled) {
            background-color: #f3f4f6;
            transform: scale(1.05);
        }

        .cal-day.selected {
            background-color: #2c2c2c;
            color: white;
            font-weight: bold;
        }

        .cal-day:disabled {
            color: #d1d5db;
            cursor: not-allowed;
            background-color: transparent;
        }

        .cal-header {
            text-align: center;
            font-size: 0.75rem;
            color: #9ca3af;
            padding-bottom: 8px;
        }

        .cal-header-sat {
            color: #60a5fa;
        }

        .cal-header-sun {
            color: #f87171;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col">

    <!-- Navigation -->
    <nav class="p-6 flex justify-between items-center bg-white/50 sticky top-0 z-50">
        <h1 class="text-2xl font-bold tracking-widest text-[#2c2c2c]">AKASAKA <span class="text-[#d4af37]">SALON</span>
        </h1>
        <button id="adminBtn" class="text-gray-400 hover:text-gray-600">
            <i data-lucide="settings"></i>
        </button>
    </nav>

    <!-- Main Container -->
    <main id="app" class="flex-grow max-w-4xl mx-auto w-full p-4 md:p-8">

        <!-- Step Indicators (4 steps now) -->
        <div class="flex justify-center space-x-2 mb-12">
            <div id="dot1" class="step-indicator active"></div>
            <div id="dot2" class="step-indicator"></div>
            <div id="dot3" class="step-indicator"></div>
            <div id="dot4" class="step-indicator"></div>
        </div>

        <!-- content injected here -->
        <div id="content" class="fade-enter"></div>

    </main>

    <!-- Modal for Loading -->
    <div id="loader" class="fixed inset-0 bg-white/80 hidden z-[100] flex flex-col items-center justify-center">
        <div class="spinner"></div>
        <p class="mt-4 text-sm font-medium text-gray-500">Loading...</p>
    </div>

    <!-- Modal for Admin Password -->
    <div id="passwordModal"
        class="fixed inset-0 bg-black/60 hidden z-[250] flex flex-col items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl w-full max-w-md p-8 luxury-card text-center relative">
            <button id="closePwdBtn" class="absolute top-4 right-4 text-gray-400 hover:text-gray-800"><i
                    data-lucide="x"></i></button>
            <i data-lucide="lock" class="w-12 h-12 mx-auto mb-4 text-[#d4af37]"></i>
            <h2 class="text-2xl font-bold mb-2">Admin Login</h2>
            <p class="text-sm text-gray-500 mb-6">管理者パスワードを入力してください</p>
            <input type="password" id="adminPasswordInput"
                class="w-full p-3 rounded-lg border border-gray-200 mb-4 text-center tracking-widest focus:outline-none focus:border-[#d4af37]"
                placeholder="••••••••">
            <button id="submitPwdBtn" class="w-full btn-primary py-3 rounded-lg font-bold">認証する</button>
            <p id="pwdError" class="text-red-500 text-sm mt-4 hidden font-bold">パスワードが違います</p>
        </div>
    </div>

    <!-- Modal for Admin Dashboard -->
    <div id="adminModal" class="fixed inset-0 bg-black/50 hidden z-[200] items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-3xl max-h-[90vh] overflow-y-auto p-6 luxury-card flex flex-col">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2 class="text-2xl font-bold text-gray-800">Menu Dashboard</h2>
                    <p class="text-xs text-gray-500">スプレッドシートデータ管理</p>
                </div>
                <div class="flex gap-2">
                    <button id="addNewMenuBtn"
                        class="flex items-center text-sm bg-[#d4af37] text-white px-4 py-2 rounded-full hover:bg-yellow-600 transition">
                        <i data-lucide="plus" class="w-4 h-4 mr-1"></i> 追加
                    </button>
                    <button id="closeAdminBtn" class="p-2 bg-gray-100 hover:bg-gray-200 rounded-full transition">
                        <i data-lucide="x"></i>
                    </button>
                </div>
            </div>

            <div id="adminFilterContainer" class="mb-4 flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                <!-- Filters injected here -->
            </div>

            <div id="adminList" class="space-y-4 flex-grow overflow-y-auto pr-2">
                <!-- Data injected here -->
            </div>
        </div>
    </div>

    <script>
        // TODO: デプロイ後のGASウェブアプリのURLを設定してください
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbwvG2jnUJEKaX80Wbs4GBYJhXc1V1MMQzKnSWNWnFL0TbpmQFmB9CKrMiofO00-x8aW/exec';

        let state = {
            step: 1,
            gender: null,
            category: null,
            menu: null,
            date: null,
            time: null,

            allMenuCategoriesObj: {}, // GASから返される全体オブジェクト {"フェイシャル": [...], "脱毛": [...]}
            categoryList: [],         // 抽出したカテゴリキーの配列
            currentCategoryMenus: [], // 選択されたカテゴリのメニュー配列

            adminPassword: '',
            adminMenusRaw: []         // 管理画面用に平坦化した配列
        };

        // GAS API Caller
        async function fetchGAS(action, payload = {}) {
            if (!GAS_URL || GAS_URL === 'YOUR_WEB_APP_URL') {
                throw new Error("GAS URLs is missing.");
            }

            try {
                const formParams = new URLSearchParams();
                formParams.append('payload', JSON.stringify({ action, ...payload }));

                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'cors',
                    redirect: 'follow',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formParams.toString()
                });

                const text = await res.text();
                console.log(`[fetchGAS] Action: '${action}' -----------------`);
                console.log(`[fetchGAS] Raw Data: \n`, text);

                if (!res.ok) throw new Error(`HTTP Error: ${res.status}`);

                let json;
                try {
                    json = JSON.parse(text);
                } catch (e) {
                    throw new Error("GAS Returned invalid Format Data.");
                }

                if (json.status === 'success') {
                    // 日本語ヘッダー吸収マッピング：getMenusByCategoryの時のみ
                    if (action === 'getMenusByCategory') {
                        const mappedResult = {};
                        for (let cat in json.data) {
                            mappedResult[cat] = json.data[cat].map(item => ({
                                rowId: item.rowId,
                                Gender: item.Gender || item["B列 (Gender)"] || '',
                                Category: item.Category || item["H列 (Category)"] || item["カテゴリ"] || cat,
                                Name: item.Name || item["C列 (Name)"] || '',
                                Duration: item.Duration || item["D列 (Duration)"] || 0,
                                Price: item.Price || item["E列 (Price)"] || 0,
                                Description: item.Description || item["F列 (Description)"] || '',
                                Coupon: item.Coupon !== undefined ? item.Coupon : (item["G列 (Coupon)"] === "有" || item["G列 (Coupon)"] === true)
                            }));
                        }
                        return mappedResult;
                    }
                    return json.data;
                } else {
                    throw new Error(json.message || "Unknown GAS error");
                }
            } catch (error) {
                console.error(`[fetchGAS] Exception:`, error);
                throw error;
            }
        }

        lucide.createIcons();

        const content = document.getElementById('content');
        const loader = document.getElementById('loader');

        async function goToStep(step) {
            state.step = step;
            updateDots();
            await gsap.to(content, { opacity: 0, y: -10, duration: 0.2 });
            renderStep();
            gsap.fromTo(content, { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.4 });
            lucide.createIcons();
        }

        function updateDots() {
            [1, 2, 3, 4].forEach(i => {
                const dot = document.getElementById(`dot${i}`);
                if (dot) dot.className = `step-indicator ${state.step >= i ? 'active' : ''}`;
            });
        }

        function showLoader(show) {
            loader.classList.toggle('hidden', !show);
        }

        // ===============================================
        // STEPS
        // ===============================================

        function renderStep() {
            content.innerHTML = '';
            if (state.step === 1) renderGenderSelection();
            else if (state.step === 2) renderCategorySelection();
            else if (state.step === 3) renderMenuSelection();
            else if (state.step === 4) renderDateTimeSelection();
        }

        function renderGenderSelection() {
            content.innerHTML = `
                <div class="text-center mb-12">
                    <h2 class="text-3xl font-bold mb-2">Welcome</h2>
                    <p class="text-gray-500">性別を選択してください</p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <button data-gender="Lady's" class="gender-btn luxury-card p-12 rounded-2xl flex flex-col items-center group">
                        <div class="p-6 bg-[#fdf2f2] rounded-full mb-6 group-hover:bg-[#fbdada] transition-colors">
                            <i data-lucide="venus" class="w-12 h-12 text-[#e28a8a]"></i>
                        </div>
                        <span class="text-2xl font-bold">Lady's</span>
                        <span class="text-sm text-gray-400 mt-2">Women</span>
                    </button>
                    <button data-gender="Men's" class="gender-btn luxury-card p-12 rounded-2xl flex flex-col items-center group">
                        <div class="p-6 bg-[#f2f6fd] rounded-full mb-6 group-hover:bg-[#dae4fb] transition-colors">
                            <i data-lucide="mars" class="w-12 h-12 text-[#8aade2]"></i>
                        </div>
                        <span class="text-2xl font-bold">Men's</span>
                        <span class="text-sm text-gray-400 mt-2">Men</span>
                    </button>
                </div>
            `;

            document.querySelectorAll('.gender-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    selectGender(btn.getAttribute('data-gender'));
                });
            });
        }

        async function selectGender(gender) {
            state.gender = gender;
            showLoader(true);
            try {
                // Fetch heavily grouped mapping {"カテゴリ": [Menu, Menu], "カテゴリ2": [Menu]}
                state.allMenuCategoriesObj = await fetchGAS('getMenusByCategory', { gender });
                state.categoryList = Object.keys(state.allMenuCategoriesObj);

                if (state.categoryList.length === 0) {
                    alert('データがありません。スプレッドシートを確認してください。');
                    location.reload();
                    return;
                }
                goToStep(2);
            } catch (e) {
                alert('データ取得エラー：詳細はF12の開発者コンソールを確認してください。');
            } finally {
                showLoader(false);
            }
        }

        function renderCategorySelection() {
            content.innerHTML = `
                <div class="mb-8">
                    <button id="backBtn" class="text-sm text-gray-400 flex items-center hover:text-gray-600 mb-4">
                        <i data-lucide="chevron-left" class="w-4 h-4 mr-1"></i> 性別選択へ戻る
                    </button>
                    <h2 class="text-2xl font-bold">カテゴリを選択</h2>
                    <p class="text-gray-500 text-sm mt-1">${state.gender}</p>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                    ${state.categoryList.map(cat => `
                        <button data-cat="${cat}" class="cat-btn luxury-card py-8 px-4 rounded-xl flex flex-col items-center group hover:bg-[#2c2c2c] hover:text-white transition-colors">
                            <i data-lucide="sparkles" class="w-8 h-8 text-[#d4af37] mb-3"></i>
                            <span class="font-bold whitespace-nowrap">${cat}</span>
                            <span class="text-[10px] text-gray-400 mt-2 group-hover:text-gray-300">${state.allMenuCategoriesObj[cat].length} Menus</span>
                        </button>
                    `).join('')}
                </div>
            `;

            document.getElementById('backBtn').addEventListener('click', () => goToStep(1));

            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const cat = btn.getAttribute('data-cat');
                    state.category = cat;
                    state.currentCategoryMenus = state.allMenuCategoriesObj[cat];
                    goToStep(3);
                });
            });
        }

        function renderMenuSelection() {
            let menuContent = '';

            if (!state.currentCategoryMenus || state.currentCategoryMenus.length === 0) {
                menuContent = `<div class="col-span-full py-12 text-center text-gray-400">メニューが見つかりません。</div>`;
            } else {
                menuContent = state.currentCategoryMenus.map((menu, index) => `
                    <div data-index="${index}" class="menu-card luxury-card p-6 rounded-2xl flex flex-col md:flex-row justify-between items-start md:items-center cursor-pointer hover:border-[#d4af37]">
                        <div class="flex-grow">
                            <div class="flex items-center gap-3 mb-2">
                                <h3 class="text-lg font-bold">${menu.Name || '名称未設定'}</h3>
                                ${menu.Coupon ? `<span class="bg-[#fdf2f2] text-[#e28a8a] text-[10px] px-2 py-0.5 rounded-full font-bold">COUPON</span>` : ''}
                            </div>
                            <p class="text-sm text-gray-500 mb-4 leading-relaxed">${menu.Description || ''}</p>
                            <div class="flex items-center text-xs text-gray-400 space-x-4">
                                <span class="flex items-center"><i data-lucide="clock" class="w-3 h-3 mr-1"></i> ${menu.Duration || 0}分</span>
                                <span class="font-bold text-gray-800">¥${Number(menu.Price || 0).toLocaleString()}</span>
                            </div>
                        </div>
                        <div class="mt-4 md:mt-0 md:ml-6 flex items-center text-[#d4af37] font-bold text-sm">
                            選択する <i data-lucide="chevron-right" class="w-4 h-4 ml-1"></i>
                        </div>
                    </div>
                `).join('');
            }

            content.innerHTML = `
                <div class="mb-8">
                    <button id="backBtn" class="text-sm text-gray-400 flex items-center hover:text-gray-600 mb-4">
                        <i data-lucide="chevron-left" class="w-4 h-4 mr-1"></i> カテゴリ選択へ戻る
                    </button>
                    <h2 class="text-2xl font-bold">${state.category}</h2>
                    <p class="text-gray-500 text-sm mt-1">希望のメニューを選んでください</p>
                </div>
                <div class="grid gap-6">
                    ${menuContent}
                </div>
            `;

            document.getElementById('backBtn').addEventListener('click', () => goToStep(2));

            document.querySelectorAll('.menu-card').forEach(card => {
                card.addEventListener('click', () => {
                    const index = parseInt(card.getAttribute('data-index'), 10);
                    state.menu = state.currentCategoryMenus[index];

                    // カレンダー用初期データ設定 (今日の日付)
                    const tempDate = new Date();
                    state.calYear = tempDate.getFullYear();
                    state.calMonth = tempDate.getMonth();
                    state.date = null; // まだ選択していない

                    goToStep(4);
                });
            });
        }

        // --- CALENDAR UI ---
        function renderDateTimeSelection() {
            content.innerHTML = `
                <div class="mb-8 flex justify-between items-end border-b border-gray-200 pb-4">
                    <div>
                        <button id="backBtn" class="text-sm text-gray-400 flex items-center hover:text-gray-600 mb-4">
                            <i data-lucide="chevron-left" class="w-4 h-4 mr-1"></i> メニュー選択へ戻る
                        </button>
                        <h2 class="text-2xl font-bold">日付を選択</h2>
                        <p class="text-xs text-gray-400 mt-1">${state.menu.Name} (${state.menu.Duration}分)</p>
                    </div>
                    <div class="flex gap-4 items-center">
                        <button id="prevMonth" class="p-2 hover:bg-white rounded-full transition"><i data-lucide="chevron-left"></i></button>
                        <span class="font-bold text-lg min-w-[100px] text-center">${state.calYear}年 ${state.calMonth + 1}月</span>
                        <button id="nextMonth" class="p-2 hover:bg-white rounded-full transition"><i data-lucide="chevron-right"></i></button>
                    </div>
                </div>
                
                <div class="bg-white p-6 rounded-2xl luxury-card mb-8">
                    <div class="cal-grid mb-2">
                        <div class="cal-header cal-header-sun">日</div>
                        <div class="cal-header">月</div>
                        <div class="cal-header">火</div>
                        <div class="cal-header">水</div>
                        <div class="cal-header">木</div>
                        <div class="cal-header">金</div>
                        <div class="cal-header cal-header-sat">土</div>
                    </div>
                    <div id="calendarGrid" class="cal-grid"></div>
                </div>

                <h3 class="font-bold mb-4 flex items-center"><i data-lucide="clock" class="w-4 h-4 mr-2 text-[#d4af37]"></i> 空き枠</h3>
                <div id="timeSlots" class="grid grid-cols-3 md:grid-cols-5 gap-3">
                    <div class="col-span-full py-8 text-center text-gray-400 bg-white rounded-xl text-sm">カレンダーで日付をタップしてください</div>
                </div>
            `;

            document.getElementById('backBtn').addEventListener('click', () => goToStep(3));
            document.getElementById('prevMonth').addEventListener('click', () => changeMonth(-1));
            document.getElementById('nextMonth').addEventListener('click', () => changeMonth(1));

            generateCalendarDays();

            // 選択されている日付があれば枠を取得する
            if (state.date) {
                fetchSlots();
            }
        }

        function changeMonth(delta) {
            state.calMonth += delta;
            if (state.calMonth < 0) { state.calMonth = 11; state.calYear--; }
            if (state.calMonth > 11) { state.calMonth = 0; state.calYear++; }
            renderDateTimeSelection();
            lucide.createIcons();
        }

        function generateCalendarDays() {
            const grid = document.getElementById('calendarGrid');
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            // 当月1日の曜日を取得し、空白セルを作成
            const firstDay = new Date(state.calYear, state.calMonth, 1).getDay();
            const daysInMonth = new Date(state.calYear, state.calMonth + 1, 0).getDate();

            let html = '';
            // 1日の前の空白ブロック
            for (let i = 0; i < firstDay; i++) {
                html += `<div></div>`;
            }

            // 日付ブロック
            for (let i = 1; i <= daysInMonth; i++) {
                const iterDate = new Date(state.calYear, state.calMonth, i);
                const isPast = iterDate < today;
                const isoDate = `${state.calYear}-${String(state.calMonth + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;

                let classes = 'cal-day ';
                if (isPast) classes += 'text-gray-300';
                if (state.date === isoDate) classes += 'selected';

                html += `<button class="${classes}" ${isPast ? 'disabled' : ''} data-date="${isoDate}">${i}</button>`;
            }
            grid.innerHTML = html;

            document.querySelectorAll('.cal-day:not(:disabled)').forEach(btn => {
                btn.addEventListener('click', () => {
                    state.date = btn.getAttribute('data-date');
                    // 再描画して selected クラスを適用、TimeSlotsを呼び出す
                    renderDateTimeSelection();
                    lucide.createIcons();
                });
            });
        }

        async function fetchSlots() {
            const slotContainer = document.getElementById('timeSlots');
            slotContainer.innerHTML = `<div class="col-span-full py-8 text-center text-gray-400"><div class="spinner mx-auto mb-2"></div>検索中...</div>`;

            try {
                const duration = state.menu.Duration ? state.menu.Duration : 60;

                const slots = await fetchGAS('getAvailableSlots', {
                    dateStr: state.date,
                    durationMin: duration
                });

                slotContainer.innerHTML = slots.length > 0
                    ? slots.map(time => `<button data-time="${time}" class="time-btn p-3 rounded-lg text-center text-sm font-bold bg-white luxury-card hover:bg-black hover:text-[#d4af37] transition-all">${time}</button>`).join('')
                    : `<div class="col-span-full py-8 text-center text-red-400 font-bold bg-[#fdf2f2] rounded-xl text-sm">予約可能な枠がありません</div>`;

                document.querySelectorAll('.time-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        confirmBooking(btn.getAttribute('data-time'));
                    });
                });
            } catch (e) {
                slotContainer.innerHTML = '<p class="col-span-full text-center py-8 text-red-500 text-sm">通信エラー。再試行してください。</p>';
            }
        }

        async function confirmBooking(time) {
            const name = prompt(`${state.menu.Name} \n${state.date} ${time} から予約します。お名前を入れてください。`);
            if (!name) return;

            showLoader(true);
            try {
                await fetchGAS('createBooking', {
                    details: {
                        gender: state.gender,
                        menuName: state.menu.Name,
                        dateStr: state.date,
                        timeStr: time,
                        durationMin: state.menu.Duration,
                        customerName: name
                    }
                });
                alert('予約が完了しました！');
                location.reload();
            } catch (e) {
                alert('予約に失敗しました。時間をおいて再試行してください。');
            } finally {
                showLoader(false);
            }
        }


        // ===============================================
        // ADMIN DASHBOARD (PASSWORD PROTECTED)
        // ===============================================

        const pwdModal = document.getElementById('passwordModal');
        const adminModal = document.getElementById('adminModal');
        const pwdInput = document.getElementById('adminPasswordInput');
        const pwdError = document.getElementById('pwdError');

        // 1. Password Flow
        document.getElementById('adminBtn').addEventListener('click', () => {
            pwdInput.value = '';
            pwdError.classList.add('hidden');
            pwdModal.style.display = 'flex';
        });

        document.getElementById('closePwdBtn').addEventListener('click', () => {
            pwdModal.style.display = 'none';
        });

        document.getElementById('submitPwdBtn').addEventListener('click', attemptAdminLogin);
        pwdInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') attemptAdminLogin(); });

        async function attemptAdminLogin() {
            const pwd = pwdInput.value;
            if (!pwd) return;

            state.adminPassword = pwd;
            pwdError.classList.add('hidden');
            showLoader(true);

            try {
                // Fetch ALL menus (no gender filter) to manage
                const res = await fetchGAS('getMenusByCategory', { gender: '' });
                // Flatten the category mapping back to a single array for easier management UI
                state.adminMenusRaw = [];
                for (let cat in res) {
                    res[cat].forEach(menu => state.adminMenusRaw.push(menu));
                }

                // Sort by rowId to keep structural order
                state.adminMenusRaw.sort((a, b) => a.rowId - b.rowId);

                pwdModal.style.display = 'none';
                adminModal.style.display = 'flex';
                renderAdminList();
            } catch (e) {
                // API通信は成功したがJSONが返ってこなかったなどの場合
                pwdError.classList.remove('hidden');
            } finally {
                showLoader(false);
            }
        }

        document.getElementById('closeAdminBtn').addEventListener('click', () => {
            adminModal.style.display = 'none';
            state.adminPassword = ''; // 画面を閉じたらパスワードクリア

            // 閉じた時に、最新の adminMenusRaw を元に、実際に予約画面で使う allMenuCategoriesObj と categoryList を再構築する
            const updatedCategories = {};
            state.adminMenusRaw.forEach(menu => {
                const cat = menu.Category || 'その他';
                if (!updatedCategories[cat]) updatedCategories[cat] = [];
                updatedCategories[cat].push(menu);
            });
            state.allMenuCategoriesObj = updatedCategories;
            state.categoryList = Object.keys(state.allMenuCategoriesObj);

            // もし既にカテゴリ選択済みの場合は最新データにすり替える
            if (state.category) {
                state.currentCategoryMenus = state.allMenuCategoriesObj[state.category] || [];
            }

            // 表示中の画面をそのまま最新データで再描画する
            if (state.step === 2 || state.step === 3) {
                renderStep();
                lucide.createIcons();
            }
        });

        // 2. Admin UI Generation
        function renderAdminList() {
            const list = document.getElementById('adminList');
            const defaultDate = new Date().toISOString().split('T')[0];

            list.innerHTML = state.adminMenusRaw.map(menu => `
                <div class="p-4 border border-gray-100 bg-[#fbfbfb] rounded-xl relative group">
                    <button class="delete-menu-btn absolute top-2 right-2 text-red-300 hover:text-red-500 p-2 hidden group-hover:block transition" data-rowid="${menu.rowId}">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>

                    <div class="flex gap-4 mb-3">
                        <div class="flex-1">
                            <label class="text-[10px] text-gray-400 uppercase">Gender / Target</label>
                            <input type="text" value="${menu.Gender || ''}" data-rowid="${menu.rowId}" data-field="Gender" class="admin-input w-full text-xs font-bold bg-transparent border-b border-gray-200 focus:border-[#d4af37] outline-none pb-1">
                        </div>
                        <div class="flex-1">
                            <label class="text-[10px] text-gray-400 uppercase">Category</label>
                            <input type="text" value="${menu.Category || ''}" data-rowid="${menu.rowId}" data-field="Category" class="admin-input w-full text-xs font-bold bg-transparent border-b border-gray-200 focus:border-[#d4af37] outline-none pb-1">
                        </div>
                        <div class="w-16">
                            <label class="text-[10px] text-gray-400 uppercase">Row ID</label>
                            <p class="text-xs font-bold text-gray-400 py-1">${menu.rowId || 'NEW'}</p>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="text-[10px] text-[#d4af37] font-bold uppercase">Menu Name (メニュー名)</label>
                        <input type="text" value="${menu.Name || ''}" data-rowid="${menu.rowId}" data-field="Name" class="admin-input w-full text-sm font-bold bg-transparent border-b border-gray-300 focus:border-[#d4af37] outline-none pb-1">
                    </div>

                    <div class="mb-3">
                        <label class="text-[10px] text-gray-400 uppercase">Description (詳細)</label>
                        <textarea data-rowid="${menu.rowId}" data-field="Description" class="admin-input w-full text-xs bg-gray-50/50 border border-gray-200 rounded-lg p-2 focus:border-[#d4af37] focus:ring-1 focus:ring-[#d4af37] outline-none resize-y" rows="2" placeholder="メニューの説明を入力">${menu.Description || ''}</textarea>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] text-gray-400 uppercase">Duration (min)</label>
                            <input type="number" value="${menu.Duration || 0}" data-rowid="${menu.rowId}" data-field="Duration" class="admin-input w-full text-xs bg-transparent border-b border-gray-200 focus:border-[#d4af37] outline-none pb-1">
                        </div>
                        <div>
                            <label class="text-[10px] text-gray-400 uppercase">Price (JPY)</label>
                            <input type="number" value="${menu.Price || 0}" data-rowid="${menu.rowId}" data-field="Price" class="admin-input w-full text-xs bg-transparent border-b border-gray-200 focus:border-[#d4af37] outline-none pb-1">
                        </div>
                    </div>
                </div>
            `).join('');

            lucide.createIcons();

            // Auto-Save listeners
            document.querySelectorAll('.admin-input').forEach(input => {
                input.addEventListener('change', async (e) => {
                    const rowId = parseInt(e.target.getAttribute('data-rowid'), 10);
                    const field = e.target.getAttribute('data-field');
                    const value = e.target.value;
                    e.target.classList.add('animate-pulse', 'text-gray-400');
                    await adminUpdateField(rowId, field, value);
                    e.target.classList.remove('animate-pulse', 'text-gray-400');
                });
            });

            // Delete listeners
            document.querySelectorAll('.delete-menu-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const btnEl = e.target.closest('button');
                    const rowId = parseInt(btnEl.getAttribute('data-rowid'), 10);
                    if (confirm(`Row ID: ${rowId} を削除します。元に戻せません。よろしいですか？`)) {
                        await adminDeleteRow(rowId);
                    }
                });
            });
        }

        // 3. Admin Action Fetchers (Sending Password payload)
        async function adminUpdateField(rowId, field, value) {
            try {
                // Code.gs requires "password" inside the params payload for auth
                await fetchGAS('updateMenuData', {
                    password: state.adminPassword,
                    rowId,
                    updateObj: { [field]: value }
                });

                // Update local model
                const item = state.adminMenusRaw.find(m => m.rowId === rowId);
                if (item) item[field] = value;
            } catch (e) {
                alert('更新失敗。パスワードの期限切れか通信エラーです。');
            }
        }

        async function adminDeleteRow(rowId) {
            showLoader(true);
            try {
                await fetchGAS('deleteMenuData', { password: state.adminPassword, rowId });
                state.adminMenusRaw = state.adminMenusRaw.filter(m => m.rowId !== rowId);
                renderAdminList();
            } catch (e) {
                alert('削除失敗しました。');
            } finally {
                showLoader(false);
            }
        }

        document.getElementById('addNewMenuBtn').addEventListener('click', async () => {
            const cat = prompt("新しいメニューのカテゴリ名を入力してください (例: フェイシャル)");
            if (!cat) return;
            const name = prompt("メニュー名を入力してください");
            if (!name) return;

            showLoader(true);
            try {
                const newObj = {
                    "Gender": "Lady's", // Default
                    "Category": cat,
                    "Name": name,
                    "Duration": 60,
                    "Price": 5000,
                    "Description": ""
                };

                await fetchGAS('addMenuData', { password: state.adminPassword, newObj });

                // Refresh data entirely from GAS to get real rowID mapping
                const res = await fetchGAS('getMenusByCategory', { gender: '' });
                state.adminMenusRaw = [];
                for (let c in res) res[c].forEach(m => state.adminMenusRaw.push(m));
                state.adminMenusRaw.sort((a, b) => a.rowId - b.rowId);

                renderAdminList();
                alert('追加成功！一覧の下の方を確認してください。');
            } catch (e) {
                alert('追加中にエラーが発生しました。');
            } finally {
                showLoader(false);
            }
        });

        // Initial Start
        goToStep(1);
    </script>
</body>

</html>
